# openspec/config.yaml — Nebula Drift
schema: spec-driven

context: |
  Project: Nebula Drift
  Type: Android game — space survival/shooter with Flappy Bird-style mechanics,
        targeting mobile quality level of Clash Royale / Brawl Stars.
  Stack: Kotlin 1.9.24 + libGDX 1.12.1 + KTX 1.12.1-rc2 + AGP 8.2.0
  Platform: Android (minSdk 21, targetSdk 34), desktop (LWJGL3)
  Java: 17 (source & target)
  Modules: core (shared), desktop, android
  Testing: JUnit 5.10.1 + MockK 1.13.8 + libGDX headless backend
  Arch: Entity-System pattern with separate rendering, input, and screen layers.
  CI: GitHub Actions — runs :core:test, assembles debug APK

rules:
  proposal:
    - Include rollback plan for risky changes
    - Proposals must justify tech stack choice with tradeoffs
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns once established
    tdd: true
    test_command: "./gradlew :core:test"
  verify:
    test_command: "./gradlew :core:test"
    build_command: "./gradlew :android:assembleDebug"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

testing:
  strict_tdd: true
  reason: "JUnit 5 test runner detected in core module with existing test suite. Strict TDD enabled by default."
  layers:
    unit:
      available: true
      tool: "JUnit 5 (Jupiter) + MockK"
    integration:
      available: false
      tool: ""
    e2e:
      available: false
      tool: ""
  coverage:
    available: false
    command: ""
  quality:
    linter:
      available: false
      command: ""
    type_checker:
      available: true
      command: "Kotlin compiler (via Gradle)"
    formatter:
      available: false
      command: ""
